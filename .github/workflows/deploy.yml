name: Deploy to Oracle Cloud

on:
  push:
    branches:
      - main

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Backend checks
        run: pnpm --filter backend run test && pnpm --filter backend run build

      - name: Frontend build
        run: pnpm --filter frontend run build

      - name: Deploy to Oracle VM
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/blog-app
            git pull origin main
            pnpm install
            export OCI_CLI_AUTH=api_key
            export DATABASE_URL="$(oci secrets secret-bundle get --secret-id "${{ secrets.OCI_DB_SECRET_ID }}" --query 'data."secret-bundle-content".content' --raw-output | base64 --decode)"
            pnpm --filter backend run db:migrate
            pnpm --filter backend run build
            pm2 restart blog-backend
            pnpm --filter frontend run build
            cp -r frontend/dist/* /var/www/html/

version: "3.8"

services:
  backend:
    build: ./backend
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app
      - sqlite-data:/app/data
    environment:
      DATABASE_URL: file:/app/data/blog.db
      NODE_ENV: development

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - ./shared:/shared
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://backend:3001

volumes:
  sqlite-data:
